name: WB
description: Приложение для комплексного управления кабинетом WB

version: 3.0.1+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  webview_windows: ^0.4.0
  device_info_plus: ^9.0.3
  shared_preferences: ^2.2.2
  http: ^1.1.0
  window_manager: ^0.4.0
  excel: ^3.0.0
  file_picker: ^5.0.0
  open_file: ^3.3.3
  path_provider: ^2.1.3
  path: ^1.8.0
  pluto_grid: ^8.0.0
  provider: ^6.1.1
  dart_duckdb: ^1.0.0  # Добавляем DuckDB
  intl: ^0.19.0
  # Убираем или комментируем Hive:
  # hive_flutter: ^0.3.4+5
  # hive: ^2.2.3
  table_calendar: ^3.0.9
  video_player: ^2.8.0
  lottie: ^2.7.0  # ← АЛЬТЕРНАТИВА ДЛЯ АНИМАЦИИ
  auto_size_text: ^3.0.0
  fl_chart: ^0.68.0
  csv: ^5.1.0
  graphic: ^2.7.0
  html: ^0.15.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/excel.png
    - assets/video/init_animation.mp4
    - assets/default_custom_columns.json
    - assets/default_custom_columns_universal.json

flutter_launcher_icons:
  android: false
  ios: false
  windows:
    image_path: "assets/icons/main_icon.ico"
    icon_size: 256